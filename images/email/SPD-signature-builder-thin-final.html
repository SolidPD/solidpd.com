  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>SPD signature builder<\u002Ftitle>\n<style>\n  :root { color-scheme: light; }\n  html, body { margin: 0; padding: 0; background: #fafafa; color: #1a1a1a; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }\n  .page { max-width: 1100px; margin: 0 auto; padding: 48px 40px 96px; }\n\n  .eyebrow { font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: 2.4px; text-transform: uppercase; color: #0495F6; margin: 0 0 12px; }\n  h1 { font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 34px; letter-spacing: 1.5px; text-transform: uppercase; margin: 0 0 12px; line-height: 1.1; }\n  .lede { font-size: 15.5px; line-height: 1.55; color: #4d4d4d; max-width: 640px; margin: 0 0 40px; }\n\n  .layout { display: grid; grid-template-columns: 360px 1fr; gap: 32px; align-items: flex-start; }\n  @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }\n\n  /* ============ FORM ============ */\n  .form { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 24px 26px; position: sticky; top: 24px; }\n  .form h2 { font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 1.6px; text-transform: uppercase; color: #1a1a1a; margin: 0 0 18px; }\n\n  .field { margin-bottom: 18px; }\n  .field label { display: block; font-size: 11.5px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: #4d4d4d; margin-bottom: 6px; }\n  .field input[type=text] {\n    width: 100%; box-sizing: border-box; padding: 9px 12px; font-size: 14px;\n    font-family: inherit; color: #1a1a1a; background: #fff;\n    border: 1px solid #cccccc; border-radius: 6px; outline: none;\n    transition: border-color .15s;\n  }\n  .field input[type=text]:focus { border-color: #0495F6; }\n  .field .hint { font-size: 12px; color: #808080; margin-top: 4px; line-height: 1.4; }\n\n  .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }\n  .toggle-row input[type=checkbox],\n  .toggle-row input[type=radio] { width: 16px; height: 16px; accent-color: #0495F6; cursor: pointer; margin: 0; }\n  .toggle-row label { font-size: 13px; color: #1a1a1a; cursor: pointer; letter-spacing: 0; text-transform: none; font-weight: 500; }\n\n  .pronoun-field[hidden] { display: none; }\n\n  .toggle-row.tight { margin-bottom: 0; }\n\n  /* ============ PREVIEW + COPY ============ */\n  .preview-wrap { }\n  .preview-label { font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase; color: #808080; margin: 0 0 10px; }\n  .preview {\n    background: #fff; border: 1px dashed #cccccc; border-radius: 10px;\n    padding: 32px 36px; min-height: 200px;\n  }\n  .preview iframe, .preview #sig-frame { width: 100%; border: 0; display: block; background: transparent; }\n  .preview #sig-frame { overflow-x: auto; }\n\n  .actions { display: flex; gap: 10px; margin-top: 18px; align-items: center; flex-wrap: wrap; }\n  .btn {\n    font-family: inherit; font-size: 14px; font-weight: 600; padding: 11px 22px;\n    border-radius: 7px; cursor: pointer; border: 1px solid #0495F6;\n    background: #0495F6; color: #fff;\n    transition: background .15s ease, border-color .15s ease;\n  }\n  .btn:hover { background: #0379c5; border-color: #0379c5; }\n  .btn.copied { background: #2e7d32; border-color: #2e7d32; }\n  .btn.secondary { background: #fff; color: #1a1a1a; border-color: #cccccc; }\n  .btn.secondary:hover { border-color: #999; background: #fff; }\n\n  .next-steps {\n    margin-top: 32px; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px;\n    padding: 22px 26px;\n  }\n  .next-steps h2 { font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: 1.6px; text-transform: uppercase; color: #0495F6; margin: 0 0 10px; }\n  .next-steps ol { margin: 0; padding-left: 18px; }\n  .next-steps li { font-size: 14px; line-height: 1.7; color: #1a1a1a; margin: 4px 0; }\n  .keyboard { display: inline-block; padding: 1px 6px; background: #f0f0f0; border: 1px solid #d0d0d0; border-bottom-width: 2px; border-radius: 3px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }\n\n  .toast {\n    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);\n    background: #1a1a1a; color: #fff; padding: 12px 22px; border-radius: 8px; font-size: 14px;\n    box-shadow: 0 8px 24px rgba(0,0,0,0.18);\n    opacity: 0; transition: opacity .2s, transform .2s;\n    pointer-events: none; z-index: 1000;\n  }\n  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- Splash thumbnail shown briefly while the bundled assets unpack, and as the no-JS fallback -->\n\n\n<div class=\"page\">\n\n  <p class=\"eyebrow\">Step 4 — Build your signature<\u002Fp>\n  <h1>Signature builder<\u002Fh1>\n  <p class=\"lede\">Type your info into the fields. The signature on the right updates live. When it looks right, click <strong>Copy signature<\u002Fstrong>, then paste into Gmail.<\u002Fp>\n\n  <div class=\"layout\">\n\n    <!-- ================== FORM ================== -->\n    <aside class=\"form\">\n      <h2>Your info<\u002Fh2>\n\n      <div class=\"field\">\n        <label for=\"f-name\">Full name<\u002Flabel>\n        <input id=\"f-name\" type=\"text\" value=\"Matt Bell\" autocomplete=\"off\">\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <label for=\"f-title\">Title<\u002Flabel>\n        <input id=\"f-title\" type=\"text\" value=\"Chief Executive Officer\" autocomplete=\"off\">\n        <div class=\"hint\">Spelled out, title case. E.g. “Director of Design” not “DoD”.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"toggle-row tight\">\n          <input id=\"f-show-pronouns\" type=\"checkbox\" checked=\"\">\n          <label for=\"f-show-pronouns\">Include pronouns<\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"pronoun-field\" id=\"pronoun-field\">\n          <input id=\"f-pronouns\" type=\"text\" value=\"he/him\" autocomplete=\"off\" style=\"margin-top:10px;\">\n          <div class=\"hint\">Lowercase, with a slash. E.g. “she/her”, “they/them”, “she/they”.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <label>Bottom row<\u002Flabel>\n        <div class=\"toggle-row tight\">\n          <input id=\"f-cta-call\" type=\"radio\" name=\"cta\" value=\"call\" checked=\"\">\n          <label for=\"f-cta-call\">Schedule a call<\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"toggle-row tight\" style=\"margin-top:8px;\">\n          <input id=\"f-cta-linkedin\" type=\"radio\" name=\"cta\" value=\"linkedin\">\n          <label for=\"f-cta-linkedin\">LinkedIn profile<\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"toggle-row tight\" style=\"margin-top:8px;\">\n          <input id=\"f-cta-none\" type=\"radio\" name=\"cta\" value=\"none\">\n          <label for=\"f-cta-none\">Neither<\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field\" id=\"cta-url-field\">\n        <label for=\"f-cta-url\" id=\"cta-url-label\">Scheduling link<\u002Flabel>\n        <input id=\"f-cta-url\" type=\"text\" value=\"https://calendly.com/\" autocomplete=\"off\">\n        <div class=\"hint\" id=\"cta-url-hint\">Paste your Calendly, Cal.com, or other booking URL.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- ================== PREVIEW ================== -->\n    <main class=\"preview-wrap\">\n      <p class=\"preview-label\">Live preview · this is exactly what Gmail will show<\u002Fp>\n\n      <div class=\"preview\" id=\"preview\">\n        <!-- Signature renders here as inline-styled HTML (no iframe, so relative\n             asset paths resolve and the table gets full width). -->\n        <div id=\"sig-frame           `<td valign=\"middle\" style=\"font-family:${FONT};font-size:13px;color:#1a1a1a;white-space:nowrap;\"><a href=\"${escapeHtml(ctaUrl)}\" style=\"color:#1a1a1a;text-decoration:underline;text-underline-offset:2px;\">Schedule a call<\u002Fa><\u002Ftd>` +\n        `<\u002Ftr>`;\n    } else if (cta === 'linkedin' && ctaUrl) {\n      ctaRow =\n        `<tr>` +\n          `<td valign=\"middle\" style=\"width:20px;padding:0 8px 0 0;\"><img src=\"${img('icon-linkedin-2x.png')}\" width=\"14\" height=\"14\" alt=\"\" style=\"display:block;border:0;width:14px;height:14px;\"><\u002Ftd>` +\n          `<td valign=\"middle\" style=\"font-family:${FONT};font-size:13px;color:#1a1a1a;white-space:nowrap;\"><a href=\"${escapeHtml(ctaUrl)}\" style=\"color:#1a1a1a;text-decoration:underline;text-underline-offset:2px;\">LinkedIn<\u002Fa><\u002Ftd>` +\n        `<\u002Ftr>`;\n    }\n\n    return (\n`<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" role=\"presentation\" style=\"border-collapse:collapse;font-family:${FONT};color:#1a1a1a;line-height:1.4;\">` +\n  `<tr><td style=\"padding:0 0 4px 0;white-space:nowrap;\">` +\n    `<span style=\"font-family:${FONT};font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-0.1px;\">${escapeHtml(name)}<\u002Fspan>${pronounSpan}` +\n    `<span style=\"font-family:${FONT};font-size:18px;color:#808080;padding:0 9px;vertical-align:-1px;\">&middot;<\u002Fspan>` +\n    `<span style=\"font-family:${FONT};font-size:16px;font-weight:400;color:#4d4d4d;letter-spacing:-0.1px;\">${escapeHtml(title)}<\u002Fspan>` +\n  `<\u002Ftd><\u002Ftr>` +\n  `<tr><td style=\"padding:0 0 8px 0;border-bottom:1px solid #cccccc;font-size:0;line-height:0;\">&nbsp;<\u002Ftd><\u002Ftr>` +\n  `<tr><td style=\"padding:8px 0 0 0;\">` +\n    `<table cellpadding=\"0\" cellspacing=\"0\" border=\"0\" role=\"presentation\" style=\"border-collapse:collapse;\">` +\n      `<tr>` +\n        `<td valign=\"middle\" style=\"width:20px;padding:0 8px 3px 0;\"><img src=\"${img('icon-globe-2x.png')}\" width=\"14\" height=\"14\" alt=\"\" style=\"display:block;border:0;width:14px;height:14px;\"><\u002Ftd>` +\n        `<td valign=\"middle\" style=\"padding:0 0 3px 0;font-family:${FONT};font-size:13px;color:#1a1a1a;white-space:nowrap;\"><a href=\"https://www.solidpd.com\" style=\"color:#1a1a1a;text-decoration:none;\">solidpd.com<\u002Fa><\u002Ftd>` +\n      `<\u002Ftr>` +\n      `<tr>` +\n        `<td valign=\"middle\" style=\"width:20px;padding:0 8px 3px 0;\"><img src=\"${img('icon-pin-2x.png')}\" width=\"14\" height=\"14\" alt=\"\" style=\"display:block;border:0;width:14px;height:14px;\"><\u002Ftd>` +\n        `<td valign=\"middle\" style=\"padding:0 0 3px 0;font-family:${FONT};font-size:13px;color:#1a1a1a;white-space:nowrap;\">2212 Walnut St, 1st Floor, Philadelphia, PA 19103<\u002Ftd>` +\n      `<\u002Ftr>` +\n      ctaRow +\n    `<\u002Ftable>` +\n  `<\u002Ftd><\u002Ftr>` +\n  `<tr><td style=\"padding:14px 0 0 0;\">` +\n    `<a href=\"https://www.solidpd.com\" style=\"text-decoration:none;border:0;\"><img src=\"${img('logo-horizontal-outline.png')}\" alt=\"Solid Product Design\" width=\"302\" height=\"31\" style=\"display:block;border:0;width:302px;height:auto;\"><\u002Fa>` +\n  `<\u002Ftd><\u002Ftr>` +\n`<\u002Ftable>`\n    );\n  }\n\n  function escapeHtml(s) {\n    return String(s).replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'})[c]);\n  }\n\n  function refresh() {\n    // Pronoun field toggles based on the checkbox\n    $('#pronoun-field').hidden = !$('#f-show-pronouns').checked;\n\n    // CTA URL field shows/hides + relabels based on which radio is selected\n    const cta = (document.querySelector('input[name=cta]:checked') || {}).value || 'call';\n    const urlField = $('#cta-url-field');\n    const urlLabel = $('#cta-url-label');\n    const urlHint = $('#cta-url-hint');\n    const urlInput = $('#f-cta-url');\n    if (cta === 'none') {\n      urlField.hidden = true;\n    } else {\n      urlField.hidden = false;\n      if (cta === 'call') {\n        urlLabel.textContent = 'Scheduling link';\n        urlHint.textContent = 'Paste your Calendly, Cal.com, or other booking URL.';\n        if (urlInput.value.includes('linkedin.com')) urlInput.value = 'https://calendly.com/';\n      } else if (cta === 'linkedin') {\n        urlLabel.textContent = 'LinkedIn URL';\n        urlHint.textContent = 'Paste the full URL to your LinkedIn profile.';\n        if (urlInput.value.includes('calendly.com')) urlInput.value = 'https://www.linkedin.com/in/';\n      }\n    }\n\n    // Render the preview by injecting the table block directly (no iframe).\n    // Using local asset paths so the logo/icons show before deployment.\n    const html = buildHtml(previewImg);\n    const match = html.match(/<table[\\s\\S]*<\\/table>/);\n    $('#sig-frame').innerHTML = match ? match[0] : html;\n  }\n\n  document.querySelectorAll('input').forEach(el => {\n    el.addEventListener('input', refresh);\n    el.addEventListener('change', refresh);\n  });\n  refresh();\n\n  // ============ COPY ============\n  $('#copy-btn').addEventListener('click', async () => {\n    // For copy, use the LIVE (solidpd.com) asset URLs\n    const html = buildHtml(liveImg);\n    // Extract just the <table>…<\u002Ftable> block — that's what gets pasted.\n    const match = html.match(/<table[\\s\\S]*<\\/table>/);\n    const tableHtml = match ? match[0] : html;\n    // Plain-text fallback\n    const plain = tableHtml.replace(/<[^>]+>/g, '').replace(/\\s+/g, ' ').trim();\n\n    try {\n      await navigator.clipboard.write([\n        new ClipboardItem({\n          'text/html': new Blob([tableHtml], { type: 'text/html' }),\n          'text/plain': new Blob([plain], { type: 'text/plain' })\n        })\n      ]);\n      showToast('Signature copied — now paste into Gmail');\n      const btn = $('#copy-btn');\n      btn.textContent = '✓ Copied — paste into Gmail';\n      btn.classList.add('copied');\n      setTimeout(() => {\n        btn.textContent = 'Copy signature';\n        btn.classList.remove('copied');\n      }, 3000);\n    } catch (e) {\n      // Fallback for older browsers\n      try {\n        await navigator.clipboard.writeText(tableHtml);\n        showToast('Copied raw HTML — paste into Gmail');\n      } catch (e2) {\n        showToast('Copy failed — please use the Download button');\n      }\n    }\n  });\n\n  // ============ DOWNLOAD ============\n  $('#download-btn').addEventListener('click', () => {\n    const html = buildHtml(liveImg);\n    const fullDoc =\n      '<!doctype html><html><head><meta charset=\"utf-8\"><title>Email signature<\u002Ftitle><\u002Fhead><body style=\"margin:24px;font-family:Arial,sans-serif;\">' +\n      html.replace(/<!doctype[\\s\\S]*?<body[^>]*>/i, '').replace(/<\\/body>[\\s\\S]*$/i, '') +\n      '<\u002Fbody><\u002Fhtml>';\n    const blob = new Blob([fullDoc], { type: 'text/html' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    const safeName = ($('#f-name').value || 'signature').replace(/[^a-z0-9]+/gi, '-').toLowerCase();\n    a.href = url;\n    a.download = `signature-${safeName}.html`;\n    document.body.appendChild(a);\n    a.click();\n    document.body.removeChild(a);\n    URL.revokeObjectURL(url);\n  });\n\n  // ============ TOAST ============\n  function showToast(msg) {\n    const t = $('#toast');\n    t.textContent = msg;\n    t.classList.add('show');\n    clearTimeout(t._timer);\n    t._timer = setTimeout(() => t.classList.remove('show'), 2800);\n  }\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
